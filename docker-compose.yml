services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./searxng:/etc/searxng

  api:
    build: .
    container_name: websearch-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8899}:8899"
    volumes:
      - .:/app
    environment:
      SEARXNG_URL: http://searxng:8080
      CLAUDIBLE_KEY: ${CLAUDIBLE_KEY:-}
      CLAUDIBLE_MODEL: ${CLAUDIBLE_MODEL:-gpt-5.4-mini}
    command: uvicorn server:app --host 0.0.0.0 --port 8899 --reload
    depends_on:
      - searxng
