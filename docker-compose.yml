services:
  searxng:
    image: searxng/searxng
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
    environment:
      GRANIAN_WORKERS: 2
      GRANIAN_BLOCKING_THREADS: 8

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-18899}:8899"
    volumes:
      - .:/app
    environment:
      SEARXNG_URL: ${SEARXNG_URL:-http://host.docker.internal:8888}
      WEBSEARCH_SEARCH_TIMEOUT_S: ${WEBSEARCH_SEARCH_TIMEOUT_S:-8}
      WEBSEARCH_HTTP_TIMEOUT_S: ${WEBSEARCH_HTTP_TIMEOUT_S:-12}
      WEBSEARCH_CACHE_TTL_S: ${WEBSEARCH_CACHE_TTL_S:-180}
      WEBSEARCH_DEFAULT_LANGUAGE: ${WEBSEARCH_DEFAULT_LANGUAGE:-all}
      WEBSEARCH_DEFAULT_ENGINES: ${WEBSEARCH_DEFAULT_ENGINES:-startpage,bing}
      WEBSEARCH_FALLBACK_ENGINES: ${WEBSEARCH_FALLBACK_ENGINES:-bing,wikipedia}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn server:app --host 0.0.0.0 --port 8899 --workers 2
    depends_on:
      - searxng
